<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/tools — Patient Intake Form</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1a1b26;
    --bg2:       #16161e;
    --bg3:       #1f2335;
    --panel:     #24283b;
    --border:    #2a2e42;
    --text:      #c0caf5;
    --subtle:    #565f89;
    --pink:      #f7768e;
    --orange:    #ff9e64;
    --yellow:    #e0af68;
    --green:     #9ece6a;
    --teal:      #73daca;
    --cyan:      #7dcfff;
    --blue:      #7aa2f7;
    --purple:    #bb9af7;
    --white:     #a9b1d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .root { max-width: 820px; margin: 30px auto; padding: 0 16px 60px; }

  .kitty-window {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(122,162,247,0.08), 0 24px 80px rgba(0,0,0,0.6);
    margin-bottom: 20px;
    animation: fadeSlide 0.5s ease both;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .kitty-titlebar {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kitty-dots { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red    { background: var(--pink);   box-shadow: 0 0 6px var(--pink); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .kitty-tabs { display: flex; gap: 2px; margin-left: 10px; }
  .tab { padding: 2px 14px; border-radius: 4px 4px 0 0; font-size: 12px; color: var(--subtle); border: 1px solid transparent; border-bottom: none; }
  .tab.active { background: var(--bg2); color: var(--blue); border-color: var(--border); }

  .kitty-body { padding: 20px 24px; }

  .prompt { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0; margin-bottom: 4px; font-size: 13px; }
  .p-user  { color: var(--green);  font-weight: 600; }
  .p-at    { color: var(--subtle); }
  .p-host  { color: var(--blue);   font-weight: 600; }
  .p-sep   { color: var(--subtle); margin: 0 2px; }
  .p-path  { color: var(--yellow); }
  .p-arrow { color: var(--pink);   margin-left: 6px; font-weight: 700; }
  .p-cmd   { color: var(--text);   margin-left: 6px; }
  .p-arg   { color: var(--cyan);   margin-left: 6px; }
  .p-flag  { color: var(--orange); margin-left: 6px; }

  .output { padding: 6px 0 0 0; }
  .sec-comment { color: var(--subtle); font-size: 12px; margin-bottom: 14px; font-style: italic; }
  .sec-comment::before { content: '# '; color: var(--green); }

  /* Back link */
  .back-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 12px;
  }
  .back-link {
    color: var(--purple);
    text-decoration: none;
    border-bottom: 1px solid rgba(187,154,247,0.3);
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--pink); }

  /* Form layout */
  .form-section {
    margin-bottom: 24px;
  }
  .fs-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--teal);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fs-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-grid.single { grid-template-columns: 1fr; }
  .field-grid.triple { grid-template-columns: 1fr 1fr 1fr; }

  .cf-field { display: flex; flex-direction: column; gap: 5px; }
  .cf-label { color: var(--subtle); font-size: 11px; }
  .cf-label::before { content: '--'; color: var(--orange); margin-right: 4px; }
  .cf-label .req { color: var(--pink); margin-left: 2px; }

  .cf-input, .cf-select, .cf-textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .cf-input:focus, .cf-select:focus, .cf-textarea:focus { border-color: var(--blue); }
  .cf-select { cursor: pointer; }
  .cf-select option { background: var(--bg2); }
  .cf-textarea { resize: vertical; }

  .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .radio-opt {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--white);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .radio-opt input[type="radio"] { accent-color: var(--teal); }
  .radio-opt:has(input:checked) { border-color: var(--teal); background: rgba(115,218,202,0.08); color: var(--teal); }

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .checkbox-opt {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--white);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .checkbox-opt input[type="checkbox"] { accent-color: var(--cyan); }
  .checkbox-opt:has(input:checked) { border-color: var(--cyan); background: rgba(125,207,255,0.08); color: var(--cyan); }

  .submit-row { display: flex; align-items: center; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .cf-btn {
    background: linear-gradient(135deg, var(--teal), var(--blue));
    border: none;
    border-radius: 5px;
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 24px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .cf-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .cf-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status-msg { font-size: 12px; color: var(--subtle); }
  .status-msg.success { color: var(--green); }
  .status-msg.error   { color: var(--pink); }

  .output-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.9;
    margin-top: 16px;
    display: none;
  }
  .output-box.show { display: block; }
  .ob-line { display: flex; gap: 8px; }
  .ob-key { color: var(--blue); min-width: 160px; }
  .ob-val { color: var(--green); }
  .ob-done { color: var(--green); font-weight: 700; margin-top: 8px; }

  @media (max-width: 600px) {
    .field-grid { grid-template-columns: 1fr; }
    .field-grid.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="root">

  <div class="kitty-window">
    <div class="kitty-titlebar">
      <div class="kitty-dots">
        <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
      </div>
      <div class="kitty-tabs">
        <div class="tab active">🏥 patient-intake.sh</div>
        <div class="tab">zsh</div>
      </div>
    </div>
    <div class="kitty-body">

      <div class="back-bar">
        <a class="back-link" href="index.html">← ~/portfolio</a>
        <span style="color:var(--subtle)">|</span>
        <span style="color:var(--subtle); font-size:11px">Patient Intake & Registration</span>
      </div>

      <p class="sec-comment">Submit patient information — triggers Zapier → Google Sheets + confirmation email</p>

      <div class="prompt">
        <span class="p-user">nurse</span><span class="p-at">@</span><span class="p-host">arch</span>
        <span class="p-sep">:</span><span class="p-path">~/tools</span>
        <span class="p-arrow">❯</span>
        <span class="p-cmd">./patient-intake.sh</span><span class="p-flag">--register</span>
      </div>

      <div class="output">

        <!-- SECTION 1: Patient Info -->
        <div class="form-section">
          <div class="fs-label">👤 patient_info</div>
          <div class="field-grid">
            <div class="cf-field">
              <label class="cf-label">first_name <span class="req">*</span></label>
              <input class="cf-input" id="firstName" type="text" placeholder="Juan" />
            </div>
            <div class="cf-field">
              <label class="cf-label">last_name <span class="req">*</span></label>
              <input class="cf-input" id="lastName" type="text" placeholder="dela Cruz" />
            </div>
          </div>
          <div class="field-grid triple" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">date_of_birth <span class="req">*</span></label>
              <input class="cf-input" id="dob" type="date" />
            </div>
            <div class="cf-field">
              <label class="cf-label">sex</label>
              <select class="cf-select" id="sex">
                <option value="">-- select --</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
                <option>Prefer not to say</option>
              </select>
            </div>
            <div class="cf-field">
              <label class="cf-label">civil_status</label>
              <select class="cf-select" id="civilStatus">
                <option value="">-- select --</option>
                <option>Single</option>
                <option>Married</option>
                <option>Widowed</option>
                <option>Separated</option>
              </select>
            </div>
          </div>
        </div>

        <!-- SECTION 2: Contact -->
        <div class="form-section">
          <div class="fs-label">📡 contact_info</div>
          <div class="field-grid">
            <div class="cf-field">
              <label class="cf-label">email <span class="req">*</span></label>
              <input class="cf-input" id="email" type="email" placeholder="juan@example.com" />
            </div>
            <div class="cf-field">
              <label class="cf-label">phone</label>
              <input class="cf-input" id="phone" type="tel" placeholder="+63 9XX XXX XXXX" />
            </div>
          </div>
          <div class="field-grid single" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">address</label>
              <input class="cf-input" id="address" type="text" placeholder="Street, Barangay, City, Province" />
            </div>
          </div>
        </div>

        <!-- SECTION 3: Clinical -->
        <div class="form-section">
          <div class="fs-label">🩺 clinical_info</div>
          <div class="field-grid single">
            <div class="cf-field">
              <label class="cf-label">chief_complaint <span class="req">*</span></label>
              <input class="cf-input" id="chiefComplaint" type="text" placeholder="Main reason for visit" />
            </div>
          </div>
          <div class="field-grid" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">visit_type</label>
              <div class="radio-group">
                <label class="radio-opt"><input type="radio" name="visitType" value="New Patient" /> New Patient</label>
                <label class="radio-opt"><input type="radio" name="visitType" value="Follow-up" /> Follow-up</label>
                <label class="radio-opt"><input type="radio" name="visitType" value="Emergency" /> Emergency</label>
              </div>
            </div>
            <div class="cf-field">
              <label class="cf-label">urgency_level</label>
              <div class="radio-group">
                <label class="radio-opt"><input type="radio" name="urgency" value="Routine" /> 🟢 Routine</label>
                <label class="radio-opt"><input type="radio" name="urgency" value="Urgent" /> 🟡 Urgent</label>
                <label class="radio-opt"><input type="radio" name="urgency" value="Emergency" /> 🔴 Emergency</label>
              </div>
            </div>
          </div>
          <div class="field-grid single" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">known_allergies</label>
              <input class="cf-input" id="allergies" type="text" placeholder="e.g. Penicillin, Sulfa drugs — or NKDA" />
            </div>
          </div>
          <div class="field-grid single" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">current_medications</label>
              <textarea class="cf-textarea" id="medications" rows="2" placeholder="List medications and dosages, or 'None'"></textarea>
            </div>
          </div>
          <div class="field-grid single" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">past_medical_history</label>
              <div class="checkbox-group" id="phmGroup">
                <label class="checkbox-opt"><input type="checkbox" value="Hypertension" /> Hypertension</label>
                <label class="checkbox-opt"><input type="checkbox" value="Diabetes" /> Diabetes</label>
                <label class="checkbox-opt"><input type="checkbox" value="Asthma" /> Asthma</label>
                <label class="checkbox-opt"><input type="checkbox" value="Heart Disease" /> Heart Disease</label>
                <label class="checkbox-opt"><input type="checkbox" value="Kidney Disease" /> Kidney Disease</label>
                <label class="checkbox-opt"><input type="checkbox" value="None" /> None</label>
              </div>
            </div>
          </div>
          <div class="field-grid single" style="margin-top:12px">
            <div class="cf-field">
              <label class="cf-label">additional_notes</label>
              <textarea class="cf-textarea" id="notes" rows="3" placeholder="Anything else the nurse or doctor should know..."></textarea>
            </div>
          </div>
        </div>

        <!-- SECTION 4: Emergency Contact -->
        <div class="form-section">
          <div class="fs-label">🆘 emergency_contact</div>
          <div class="field-grid triple">
            <div class="cf-field">
              <label class="cf-label">contact_name</label>
              <input class="cf-input" id="ecName" type="text" placeholder="Full name" />
            </div>
            <div class="cf-field">
              <label class="cf-label">relationship</label>
              <input class="cf-input" id="ecRelation" type="text" placeholder="e.g. Spouse, Parent" />
            </div>
            <div class="cf-field">
              <label class="cf-label">contact_number</label>
              <input class="cf-input" id="ecPhone" type="tel" placeholder="+63 9XX XXX XXXX" />
            </div>
          </div>
        </div>

        <!-- SUBMIT -->
        <div class="submit-row">
          <button class="cf-btn" id="submitBtn" onclick="submitIntake()">$ submit --register</button>
          <span class="status-msg" id="statusMsg"></span>
        </div>

        <!-- OUTPUT LOG -->
        <div class="output-box" id="outputBox">
          <div style="color:var(--subtle); font-size:11px; margin-bottom:8px"># intake_log.json</div>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────
  // Replace with your Zapier Catch Hook URL for Patient Intake
  const ZAPIER_INTAKE_WEBHOOK = 'https://hooks.zapier.com/hooks/catch/YOUR_HOOK_ID/patient-intake/';

  // ── HELPERS ────────────────────────────────────────────────────────────
  function getRadio(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : '';
  }

  function getChecked(groupId) {
    return [...document.querySelectorAll(`#${groupId} input[type="checkbox"]:checked`)]
      .map(el => el.value).join(', ') || 'None selected';
  }

  function val(id) { return document.getElementById(id).value.trim(); }

  async function submitIntake() {
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    const outputBox = document.getElementById('outputBox');

    // Validate required
    const required = [
      { id: 'firstName', label: 'first_name' },
      { id: 'lastName',  label: 'last_name' },
      { id: 'dob',       label: 'date_of_birth' },
      { id: 'email',     label: 'email' },
      { id: 'chiefComplaint', label: 'chief_complaint' },
    ];
    for (const r of required) {
      if (!val(r.id)) {
        statusMsg.className = 'status-msg error';
        statusMsg.textContent = `✗ ${r.label} is required`;
        return;
      }
    }
    const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRx.test(val('email'))) {
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = '✗ invalid email address';
      return;
    }

    const payload = {
      submission_type: 'patient_intake',
      timestamp: new Date().toISOString(),
      patient: {
        first_name:      val('firstName'),
        last_name:       val('lastName'),
        full_name:       `${val('firstName')} ${val('lastName')}`,
        date_of_birth:   val('dob'),
        sex:             val('sex'),
        civil_status:    val('civilStatus'),
      },
      contact: {
        email:   val('email'),
        phone:   val('phone'),
        address: val('address'),
      },
      clinical: {
        chief_complaint:      val('chiefComplaint'),
        visit_type:           getRadio('visitType'),
        urgency_level:        getRadio('urgency'),
        allergies:            val('allergies') || 'NKDA',
        current_medications:  val('medications') || 'None',
        past_medical_history: getChecked('phmGroup'),
        additional_notes:     val('notes'),
      },
      emergency_contact: {
        name:         val('ecName'),
        relationship: val('ecRelation'),
        phone:        val('ecPhone'),
      }
    };

    btn.textContent = '⟳ submitting...';
    btn.disabled = true;
    statusMsg.className = 'status-msg';
    statusMsg.textContent = 'sending to Zapier...';

    try {
      await fetch(ZAPIER_INTAKE_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        mode: 'no-cors'
      });

      btn.textContent = '✓ submitted';
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = '✓ logged to Google Sheets — confirmation email sent';

      // Show output log
      outputBox.className = 'output-box show';
      outputBox.innerHTML = `
        <div style="color:var(--subtle); font-size:11px; margin-bottom:8px"># intake_log.json</div>
        ${logLine('patient', payload.patient.full_name)}
        ${logLine('dob', payload.patient.date_of_birth)}
        ${logLine('email', payload.contact.email)}
        ${logLine('chief_complaint', payload.clinical.chief_complaint)}
        ${logLine('visit_type', payload.clinical.visit_type || 'Not specified')}
        ${logLine('urgency', payload.clinical.urgency_level || 'Not specified')}
        ${logLine('allergies', payload.clinical.allergies)}
        ${logLine('pmh', payload.clinical.past_medical_history)}
        ${logLine('timestamp', payload.timestamp)}
        <div class="ob-done">✓ intake registered → Zapier → Google Sheets</div>
      `;
    } catch (e) {
      btn.textContent = '✗ error — retry';
      btn.disabled = false;
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = '✗ submission failed — check console';
    }
  }

  function logLine(key, val) {
    return `<div class="ob-line"><span class="ob-key">${key}</span><span style="color:var(--subtle)">:</span><span class="ob-val"> ${val}</span></div>`;
  }
</script>
</body>
</html>
